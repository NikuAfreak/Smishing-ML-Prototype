<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0c1629"/>
      <stop offset="100%" style="stop-color:#070B19"/>
    </linearGradient>
    <linearGradient id="shield" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0ea5e9"/>
      <stop offset="100%" style="stop-color:#22d3ee"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <g transform="translate(256, 246)">
    <!-- Shield body -->
    <path d="M0-120 L100-80 L100 30 C100 90 50 130 0 150 C-50 130 -100 90 -100 30 L-100-80 Z" 
          fill="url(#shield)" opacity="0.9"/>
    <!-- Check mark -->
    <path d="M-35 15 L-10 45 L45-25" 
          stroke="white" stroke-width="18" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>
  <!-- Text -->
  <text x="256" y="440" text-anchor="middle" font-family="system-ui, sans-serif" font-weight="800" font-size="58" fill="white" letter-spacing="-2">SmishGuard</text>
</svg>
